name: 部署官网到阿里云 OSS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 准备静态官网文件
        run: |
          rm -rf site
          mkdir -p site

          cp index.html site/
          cp "本地生活AI获客系统官网.html" site/
          cp city-growth-engine-data.js site/
          cp city-growth-engine-data.json site/

          rsync -a \
            --exclude='*.mp4' \
            --exclude='*.MP4' \
            --exclude='*.mov' \
            --exclude='*.MOV' \
            assets/ site/assets/
          mkdir -p site/assets/media/web
          rsync -a assets/media/web/ site/assets/media/web/

          find site -maxdepth 3 -type f | sort

      - name: 下载阿里云 ossutil 工具
        run: |
          wget https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64
          chmod +x ossutil64

      - name: 配置阿里云 OSS
        run: |
          ./ossutil64 config \
            -i "${{ secrets.ALIYUN_ACCESS_KEY_ID }}" \
            -k "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}" \
            -e "${{ secrets.ALIYUN_OSS_ENDPOINT }}" \
            -c .ossutilconfig

      - name: 配置 OSS 静态网站托管
        run: |
          cat > website.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <WebsiteConfiguration>
            <IndexDocument>
              <Suffix>index.html</Suffix>
            </IndexDocument>
            <ErrorDocument>
              <Key>index.html</Key>
            </ErrorDocument>
          </WebsiteConfiguration>
          EOF
          ./ossutil64 website --method put "oss://${{ secrets.ALIYUN_OSS_BUCKET }}" website.xml \
            -c .ossutilconfig

      - name: 上传官网文件到 OSS
        run: |
          ./ossutil64 cp -r -f site/ "oss://${{ secrets.ALIYUN_OSS_BUCKET }}/" \
            -c .ossutilconfig

      - name: 修正网页访问响应头
        run: |
          ./ossutil64 set-meta "oss://${{ secrets.ALIYUN_OSS_BUCKET }}/" "Content-Type:text/html#Content-Disposition:inline" \
            --include "*.html" -r --update -c .ossutilconfig
          ./ossutil64 set-meta "oss://${{ secrets.ALIYUN_OSS_BUCKET }}/" "Content-Type:application/javascript#Content-Disposition:inline" \
            --include "*.js" -r --update -c .ossutilconfig
          ./ossutil64 set-meta "oss://${{ secrets.ALIYUN_OSS_BUCKET }}/" "Content-Type:application/json#Content-Disposition:inline" \
            --include "*.json" -r --update -c .ossutilconfig
          ./ossutil64 set-meta "oss://${{ secrets.ALIYUN_OSS_BUCKET }}/" "Content-Type:image/svg+xml#Content-Disposition:inline" \
            --include "*.svg" -r --update -c .ossutilconfig
          ./ossutil64 set-meta "oss://${{ secrets.ALIYUN_OSS_BUCKET }}/" "Content-Type:image/png#Content-Disposition:inline" \
            --include "*.png" -r --update -c .ossutilconfig
          ./ossutil64 set-meta "oss://${{ secrets.ALIYUN_OSS_BUCKET }}/" "Content-Type:image/jpeg#Content-Disposition:inline" \
            --include "*.jpg" -r --update -c .ossutilconfig
          ./ossutil64 set-meta "oss://${{ secrets.ALIYUN_OSS_BUCKET }}/" "Content-Type:video/mp4#Content-Disposition:inline" \
            --include "*.mp4" -r --update -c .ossutilconfig
          ./ossutil64 set-meta "oss://${{ secrets.ALIYUN_OSS_BUCKET }}/" "Content-Type:video/mp4#Content-Disposition:inline" \
            --include "*.m4v" -r --update -c .ossutilconfig
