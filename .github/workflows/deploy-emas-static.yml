name: 部署官网到阿里云 EMAS 静态托管

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy-emas-static:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装阿里云 EMAS SDK
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            alibabacloud-mpserverless20190615==2.0.0 \
            requests==2.32.4

      - name: 部署官网到 EMAS 静态托管
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          EMAS_WORKSPACE_ID: "3921191"
          EMAS_SPACE_ID: "mp-e64ce04f-c34d-4ee6-9bb4-6a395b780ae1"
          EMAS_SPACE_NAME: "chengkesite"
          EMAS_SPACE_DESC: "chengke growth website"
        run: python scripts/deploy_emas_static.py
