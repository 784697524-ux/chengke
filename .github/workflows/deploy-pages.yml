name: 部署官网到 GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 准备静态官网文件
        run: |
          rm -rf site
          mkdir -p site

          cp index.html site/
          cp "本地生活AI获客系统官网.html" site/
          cp city-growth-engine-data.js site/
          cp city-growth-engine-data.json site/
          rsync -a \
            --exclude='*.mp4' \
            --exclude='*.MP4' \
            --exclude='*.mov' \
            --exclude='*.MOV' \
            assets/ site/assets/

          find site -maxdepth 3 -type f | sort

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传 Pages 静态文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: 发布到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
